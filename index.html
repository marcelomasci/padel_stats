<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Padel Stats v2.1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 12px 12px 6px;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; color: #e0e0e0; }
  header .date-input {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #bbb;
    font-size: 0.85rem;
    padding: 5px 10px;
    margin-top: 4px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Set Tabs ── */
  .set-tabs {
    display: flex;
    gap: 4px;
    padding: 6px 16px;
    justify-content: center;
  }
  .set-tab {
    padding: 6px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: #888;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .set-tab.active {
    background: #0f3460;
    color: #fff;
    border-color: #0f3460;
  }
  .set-tab .tab-score {
    font-size: 0.65rem;
    opacity: 0.7;
    margin-left: 4px;
  }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
    margin: 4px 16px;
    background: #16213e;
    border-radius: 12px;
  }
  .score-side {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .score-games {
    font-size: 2rem;
    font-weight: 800;
    min-width: 36px;
    text-align: center;
  }
  .score-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: #ccc;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .score-btn:active { background: rgba(255,255,255,0.18); }
  .score-vs { font-size: 0.9rem; color: #555; font-weight: 700; }

  /* ── Stats Area ── */
  .stats-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px 16px;
    justify-content: center;
  }

  .stat-card {
    background: #16213e;
    border-radius: 14px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-btn {
    flex: 1;
    height: 80px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: transform 0.08s, filter 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  .stat-btn:active { transform: scale(0.94); filter: brightness(0.82); }
  .stat-btn .count { font-size: 2.4rem; line-height: 1; }
  .stat-btn .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.85; }

  .btn-winner { background: #0d7377; }
  .btn-error { background: #c0392b; }
  .btn-rally { background: #2c3e80; }

  .undo-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: #777;
    font-size: 1rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .undo-btn:active { background: rgba(255,255,255,0.14); }

  /* ── Summary ── */
  .summary {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    margin: 4px 0;
  }
  .summary-card {
    flex: 1;
    background: #16213e;
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .summary-card .sum-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
  }
  .summary-card .sum-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
  }

  /* ── Footer ── */
  footer {
    padding: 10px 14px 18px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  footer button {
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    font-size: 0.9rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  footer button:active { background: rgba(255,255,255,0.1); }

  /* ── History Panel ── */
  .panel {
    display: none;
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    z-index: 10;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.active { display: flex; }
  .panel header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
  }
  .panel .close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
  }
  .history-item {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .hi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .hi-date { font-size: 1rem; color: #999; }
  .hi-score { font-size: 1.2rem; font-weight: 700; }
  .hi-details { font-size: 1rem; color: #ccc; margin-top: 6px; }
  .hi-w { color: #5ee6c8; }
  .hi-e { color: #ff7b7b; }
  .hi-r { color: #a0b4ff; }
  .hi-delete {
    background: none;
    border: none;
    color: #555;
    font-size: 1rem;
    cursor: pointer;
    padding: 4px 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Padel Stats — Drive <span style="font-size:0.85rem;color:#bbb;font-weight:400">v2.1</span></h1>
  <input type="datetime-local" class="date-input" id="matchDate">
</header>

<!-- Set Tabs -->
<div class="set-tabs" id="setTabs"></div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="score-side">
    <span class="score-label">Nos</span>
    <button class="score-btn" onclick="addGame('nos', -1)">−</button>
    <span class="score-games" id="games-nos">0</span>
    <button class="score-btn" onclick="addGame('nos', 1)">+</button>
  </div>
  <span class="score-vs">vs</span>
  <div class="score-side">
    <button class="score-btn" onclick="addGame('ellos', -1)">−</button>
    <span class="score-games" id="games-ellos">0</span>
    <button class="score-btn" onclick="addGame('ellos', 1)">+</button>
    <span class="score-label">Ellos</span>
  </div>
</div>

<!-- Stats -->
<div class="stats-area">
  <div class="stat-card">
    <button class="stat-btn btn-winner" onclick="add('winners')">
      <div class="count" id="winners-count">0</div>
      <div class="label">Winners</div>
    </button>
    <button class="undo-btn" onclick="undo('winners')">↩</button>
  </div>
  <div class="stat-card">
    <button class="stat-btn btn-rally" onclick="add('rally')">
      <div class="count" id="rally-count">0</div>
      <div class="label">Rally</div>
    </button>
    <button class="undo-btn" onclick="undo('rally')">↩</button>
  </div>
  <div class="stat-card">
    <button class="stat-btn btn-error" onclick="add('errors')">
      <div class="count" id="errors-count">0</div>
      <div class="label">Errores NF</div>
    </button>
    <button class="undo-btn" onclick="undo('errors')">↩</button>
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="summary-card">
    <div class="sum-label">W/E Ratio</div>
    <div class="sum-value" id="ratio">-</div>
  </div>
  <div class="summary-card">
    <div class="sum-label">Efectividad</div>
    <div class="sum-value" id="effectiveness">-</div>
  </div>
  <div class="summary-card">
    <div class="sum-label">Balance</div>
    <div class="sum-value" id="balance">-</div>
  </div>
</div>

<!-- Footer -->
<footer>
  <button onclick="finishSet()">Cerrar set</button>
  <button onclick="resetMatch()">Nuevo partido</button>
  <button onclick="showHistory()">Historial</button>
  <button onclick="exportData()">Exportar</button>
</footer>

<div style="text-align:center;padding:4px 0 10px;font-size:0.85rem;color:#bbb">&copy; 2026 Marcelo Masci</div>

<!-- History Panel -->
<div class="panel" id="historyPanel">
  <header>
    <h1>Historial</h1>
    <button class="close-btn" onclick="hideHistory()">✕</button>
  </header>
  <div class="panel-body" id="historyList"></div>
</div>

<script>
const STORAGE_KEY = 'padel_match_v3';
const HISTORY_KEY = 'padel_history_v3';

function emptySet() {
  return {
    games: { nos: 0, ellos: 0 },
    stats: { winners: 0, errors: 0, rally: 0 }
  };
}

let match = { currentSet: 0, sets: [emptySet()] };

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) match = JSON.parse(saved);
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(match));
}

function currentSet() {
  return match.sets[match.currentSet];
}

function render() {
  renderTabs();
  renderScoreboard();
  renderStats();
  renderSummary();
}

function renderTabs() {
  const container = document.getElementById('setTabs');
  container.innerHTML = match.sets.map((s, i) => {
    const active = i === match.currentSet ? ' active' : '';
    const score = s.games.nos + '-' + s.games.ellos;
    return '<button class="set-tab' + active + '" onclick="switchSet(' + i + ')">' +
      'Set ' + (i + 1) + '<span class="tab-score">(' + score + ')</span></button>';
  }).join('');
}

function renderScoreboard() {
  const s = currentSet();
  document.getElementById('games-nos').textContent = s.games.nos;
  document.getElementById('games-ellos').textContent = s.games.ellos;
}

function renderStats() {
  const s = currentSet().stats;
  document.getElementById('winners-count').textContent = s.winners;
  document.getElementById('errors-count').textContent = s.errors;
  document.getElementById('rally-count').textContent = s.rally;
}

function renderSummary() {
  const s = currentSet().stats;
  const total = s.winners + s.errors + s.rally;
  const balance = (s.winners + s.rally) - s.errors;

  document.getElementById('balance').textContent = total > 0 ? (balance > 0 ? '+' + balance : balance) : '-';

  if (s.errors > 0) {
    document.getElementById('ratio').textContent = (s.winners / s.errors).toFixed(1);
  } else {
    document.getElementById('ratio').textContent = s.winners > 0 ? '∞' : '-';
  }

  if (total > 0) {
    document.getElementById('effectiveness').textContent =
      ((s.winners + s.rally) / total * 100).toFixed(0) + '%';
  } else {
    document.getElementById('effectiveness').textContent = '-';
  }
}

function add(stat) {
  currentSet().stats[stat]++;
  save();
  render();
  vibrate();
}

function undo(stat) {
  if (currentSet().stats[stat] > 0) {
    currentSet().stats[stat]--;
    save();
    render();
  }
}

function addGame(side, delta) {
  var g = currentSet().games;
  g[side] = Math.max(0, g[side] + delta);
  save();
  render();
  vibrate();
}

function switchSet(index) {
  match.currentSet = index;
  save();
  render();
}

function finishSet() {
  if (match.sets.length >= 3) {
    alert('Máximo 3 sets por partido');
    return;
  }
  var s = currentSet();
  if (s.games.nos === 0 && s.games.ellos === 0) return;

  match.sets.push(emptySet());
  match.currentSet = match.sets.length - 1;
  save();
  render();
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(30);
}

function matchHasData() {
  try {
    return match.sets.some(function(s) {
      return (s.stats.winners + s.stats.errors + s.stats.rally +
              s.games.nos + s.games.ellos) > 0;
    });
  } catch(e) {
    return false;
  }
}

function resetMatch() {
  if (!matchHasData()) {
    alert('No hay datos para guardar');
    return;
  }
  if (!confirm('¿Guardar partido actual y empezar uno nuevo?')) return;

  try {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    var dateVal = document.getElementById('matchDate').value;
    var matchDate = dateVal ? new Date(dateVal).toISOString() : new Date().toISOString();
    history.unshift({
      date: matchDate,
      sets: JSON.parse(JSON.stringify(match.sets))
    });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) {
    alert('Error guardando historial: ' + e.message);
  }

  match = { currentSet: 0, sets: [emptySet()] };
  save();
  render();
  setDateToNow();
}

function showHistory() {
  var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  var list = document.getElementById('historyList');

  if (history.length === 0) {
    list.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Sin partidos guardados</p>';
  } else {
    list.innerHTML = history.map(function(h, i) {
      var d = new Date(h.date);
      var dateStr = d.toLocaleDateString('es-AR', { weekday: 'short', day: '2-digit', month: '2-digit', year: '2-digit' });
      var scoreStr = h.sets.map(function(s) { return s.games.nos + '-' + s.games.ellos; }).join(' / ');

      var totals = h.sets.reduce(function(acc, s) {
        acc.winners += s.stats.winners;
        acc.errors += s.stats.errors;
        acc.rally += s.stats.rally;
        return acc;
      }, { winners: 0, errors: 0, rally: 0 });

      var total = totals.winners + totals.errors + totals.rally;
      var eff = total > 0 ? ((totals.winners + totals.rally) / total * 100).toFixed(0) + '%' : '-';
      var we = totals.errors > 0 ? (totals.winners / totals.errors).toFixed(1) : (totals.winners > 0 ? '∞' : '-');
      var bal = total > 0 ? (totals.winners + totals.rally) - totals.errors : 0;
      var balStr = total > 0 ? (bal > 0 ? '+' + bal : '' + bal) : '-';

      return '<div class="history-item">' +
        '<div class="hi-header">' +
          '<span class="hi-date">' + dateStr + '</span>' +
          '<span class="hi-score">' + scoreStr + '</span>' +
          '<button class="hi-delete" onclick="deleteHistory(' + i + ')">🗑</button>' +
        '</div>' +
        '<div class="hi-details">' +
          '<span class="hi-w">W:' + totals.winners + '</span> · ' +
          '<span class="hi-r">R:' + totals.rally + '</span> · ' +
          '<span class="hi-e">E:' + totals.errors + '</span>' +
        '</div>' +
        '<div class="hi-details">' +
          'W/E: ' + we + ' · Ef: ' + eff + ' · Bal: ' + balStr +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.getElementById('historyPanel').classList.add('active');
}

function hideHistory() {
  document.getElementById('historyPanel').classList.remove('active');
}

function deleteHistory(index) {
  var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  history.splice(index, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  showHistory();
}

function exportData() {
  var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  var data = { current: match, history: history };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'padel_stats_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Init
function setDateToNow() {
  var now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('matchDate').value = now.toISOString().slice(0, 16);
}
setDateToNow();
load();
</script>
</body>
</html>
