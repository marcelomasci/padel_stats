<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Padel Stats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 12px 12px 6px;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; color: #e0e0e0; }
  header .date { font-size: 0.7rem; color: #888; margin-top: 2px; }

  /* ── Set Tabs ── */
  .set-tabs {
    display: flex;
    gap: 4px;
    padding: 6px 16px;
    justify-content: center;
  }
  .set-tab {
    padding: 6px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: #888;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .set-tab.active {
    background: #0f3460;
    color: #fff;
    border-color: #0f3460;
  }
  .set-tab .tab-score {
    font-size: 0.65rem;
    opacity: 0.7;
    margin-left: 4px;
  }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
    margin: 4px 16px;
    background: #16213e;
    border-radius: 12px;
  }
  .score-side {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .score-games {
    font-size: 2rem;
    font-weight: 800;
    min-width: 36px;
    text-align: center;
  }
  .score-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: #ccc;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .score-btn:active { background: rgba(255,255,255,0.18); }
  .score-vs { font-size: 0.9rem; color: #555; font-weight: 700; }

  /* ── Stats Area ── */
  .stats-area {
    flex: 1;
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    overflow-y: auto;
  }

  .player-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .player-header {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 0;
    border-radius: 8px;
  }
  .player-header.drive { background: #1a6b35; color: #6cf5a0; }
  .player-header.reves { background: #7a3b10; color: #ffb86c; }

  .stat-card {
    background: #16213e;
    border-radius: 12px;
    padding: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-btn {
    flex: 1;
    height: 64px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: transform 0.08s, filter 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  .stat-btn:active { transform: scale(0.94); filter: brightness(0.82); }
  .stat-btn .count { font-size: 1.8rem; line-height: 1; }
  .stat-btn .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.3px; opacity: 0.85; }

  .btn-winner { background: #0d7377; }
  .btn-error { background: #c0392b; }
  .btn-rally { background: #2c3e80; }

  .undo-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: #777;
    font-size: 0.9rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .undo-btn:active { background: rgba(255,255,255,0.14); }

  /* ── Summary ── */
  .summary {
    display: flex;
    gap: 8px;
    padding: 0 10px;
    margin: 4px 0;
  }
  .summary-card {
    flex: 1;
    background: #16213e;
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .summary-card .sum-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
  }
  .summary-card .sum-label.drive { color: #6cf5a0; }
  .summary-card .sum-label.reves { color: #ffb86c; }
  .summary-card .sum-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
  }

  /* ── Footer ── */
  footer {
    padding: 10px 14px 18px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  footer button {
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    font-size: 0.9rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  footer button:active { background: rgba(255,255,255,0.1); }

  /* ── History Panel ── */
  .panel {
    display: none;
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    z-index: 10;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.active { display: flex; }
  .panel header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
  }
  .panel .close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
  }
  .history-item {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .hi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .hi-date { font-size: 1rem; color: #999; }
  .hi-score { font-size: 1.2rem; font-weight: 700; }
  .hi-details { font-size: 1rem; color: #ccc; margin-top: 6px; }
  .hi-details .hi-player { font-weight: 600; margin-right: 6px; }
  .hi-w { color: #5ee6c8; }
  .hi-e { color: #ff7b7b; }
  .hi-r { color: #a0b4ff; }
  .hi-delete {
    background: none;
    border: none;
    color: #555;
    font-size: 1rem;
    cursor: pointer;
    padding: 4px 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Padel Stats</h1>
  <div class="date" id="currentDate"></div>
</header>

<!-- Set Tabs -->
<div class="set-tabs" id="setTabs"></div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="score-side">
    <span class="score-label">Nos</span>
    <button class="score-btn" onclick="addGame('nos', -1)">−</button>
    <span class="score-games" id="games-nos">0</span>
    <button class="score-btn" onclick="addGame('nos', 1)">+</button>
  </div>
  <span class="score-vs">vs</span>
  <div class="score-side">
    <button class="score-btn" onclick="addGame('ellos', -1)">−</button>
    <span class="score-games" id="games-ellos">0</span>
    <button class="score-btn" onclick="addGame('ellos', 1)">+</button>
    <span class="score-label">Ellos</span>
  </div>
</div>

<!-- Stats: Drive & Revés -->
<div class="stats-area">
  <!-- Drive Column -->
  <div class="player-col">
    <div class="player-header drive">Drive</div>
    <div class="stat-card">
      <button class="stat-btn btn-winner" onclick="add('drive','winners')">
        <div class="count" id="drive-winners">0</div>
        <div class="label">Winners</div>
      </button>
      <button class="undo-btn" onclick="undo('drive','winners')">↩</button>
    </div>
    <div class="stat-card">
      <button class="stat-btn btn-rally" onclick="add('drive','rally')">
        <div class="count" id="drive-rally">0</div>
        <div class="label">Rally</div>
      </button>
      <button class="undo-btn" onclick="undo('drive','rally')">↩</button>
    </div>
    <div class="stat-card">
      <button class="stat-btn btn-error" onclick="add('drive','errors')">
        <div class="count" id="drive-errors">0</div>
        <div class="label">Errores NF</div>
      </button>
      <button class="undo-btn" onclick="undo('drive','errors')">↩</button>
    </div>
  </div>

  <!-- Revés Column -->
  <div class="player-col">
    <div class="player-header reves">Revés</div>
    <div class="stat-card">
      <button class="stat-btn btn-winner" onclick="add('reves','winners')">
        <div class="count" id="reves-winners">0</div>
        <div class="label">Winners</div>
      </button>
      <button class="undo-btn" onclick="undo('reves','winners')">↩</button>
    </div>
    <div class="stat-card">
      <button class="stat-btn btn-rally" onclick="add('reves','rally')">
        <div class="count" id="reves-rally">0</div>
        <div class="label">Rally</div>
      </button>
      <button class="undo-btn" onclick="undo('reves','rally')">↩</button>
    </div>
    <div class="stat-card">
      <button class="stat-btn btn-error" onclick="add('reves','errors')">
        <div class="count" id="reves-errors">0</div>
        <div class="label">Errores NF</div>
      </button>
      <button class="undo-btn" onclick="undo('reves','errors')">↩</button>
    </div>
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="summary-card">
    <div class="sum-label drive">Drive W/E</div>
    <div class="sum-value" id="drive-ratio">-</div>
  </div>
  <div class="summary-card">
    <div class="sum-label reves">Revés W/E</div>
    <div class="sum-value" id="reves-ratio">-</div>
  </div>
  <div class="summary-card">
    <div class="sum-label">Efectividad</div>
    <div class="sum-value" id="effectiveness">-</div>
  </div>
</div>

<!-- Footer -->
<footer>
  <button onclick="finishSet()">Cerrar set</button>
  <button onclick="resetMatch()">Nuevo partido</button>
  <button onclick="showHistory()">Historial</button>
  <button onclick="exportData()">Exportar</button>
</footer>

<!-- History Panel -->
<div class="panel" id="historyPanel">
  <header>
    <h1>Historial</h1>
    <button class="close-btn" onclick="hideHistory()">✕</button>
  </header>
  <div class="panel-body" id="historyList"></div>
</div>

<script>
const STORAGE_KEY = 'padel_match_v2';
const HISTORY_KEY = 'padel_history_v2';

function emptySet() {
  return {
    games: { nos: 0, ellos: 0 },
    drive: { winners: 0, errors: 0, rally: 0 },
    reves: { winners: 0, errors: 0, rally: 0 }
  };
}

let match = { currentSet: 0, sets: [emptySet()] };

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) match = JSON.parse(saved);
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(match));
}

function currentSet() {
  return match.sets[match.currentSet];
}

function render() {
  renderTabs();
  renderScoreboard();
  renderStats();
  renderSummary();
}

function renderTabs() {
  const container = document.getElementById('setTabs');
  container.innerHTML = match.sets.map((s, i) => {
    const active = i === match.currentSet ? ' active' : '';
    const score = `${s.games.nos}-${s.games.ellos}`;
    return `<button class="set-tab${active}" onclick="switchSet(${i})">
      Set ${i + 1}<span class="tab-score">(${score})</span>
    </button>`;
  }).join('');
}

function renderScoreboard() {
  const s = currentSet();
  document.getElementById('games-nos').textContent = s.games.nos;
  document.getElementById('games-ellos').textContent = s.games.ellos;
}

function renderStats() {
  const s = currentSet();
  ['drive', 'reves'].forEach(player => {
    ['winners', 'errors', 'rally'].forEach(stat => {
      document.getElementById(`${player}-${stat}`).textContent = s[player][stat];
    });
  });
}

function renderSummary() {
  const s = currentSet();

  // Drive W/E
  if (s.drive.errors > 0) {
    document.getElementById('drive-ratio').textContent = (s.drive.winners / s.drive.errors).toFixed(1);
  } else {
    document.getElementById('drive-ratio').textContent = s.drive.winners > 0 ? '∞' : '-';
  }

  // Revés W/E
  if (s.reves.errors > 0) {
    document.getElementById('reves-ratio').textContent = (s.reves.winners / s.reves.errors).toFixed(1);
  } else {
    document.getElementById('reves-ratio').textContent = s.reves.winners > 0 ? '∞' : '-';
  }

  // Effectiveness (pareja)
  const totalW = s.drive.winners + s.reves.winners;
  const totalR = s.drive.rally + s.reves.rally;
  const totalE = s.drive.errors + s.reves.errors;
  const total = totalW + totalR + totalE;
  if (total > 0) {
    document.getElementById('effectiveness').textContent = ((totalW + totalR) / total * 100).toFixed(0) + '%';
  } else {
    document.getElementById('effectiveness').textContent = '-';
  }
}

function add(player, stat) {
  currentSet()[player][stat]++;
  save();
  render();
  vibrate();
}

function undo(player, stat) {
  if (currentSet()[player][stat] > 0) {
    currentSet()[player][stat]--;
    save();
    render();
  }
}

function addGame(side, delta) {
  const g = currentSet().games;
  g[side] = Math.max(0, g[side] + delta);
  save();
  render();
  vibrate();
}

function switchSet(index) {
  match.currentSet = index;
  save();
  render();
}

function finishSet() {
  if (match.sets.length >= 3) {
    alert('Máximo 3 sets por partido');
    return;
  }
  const s = currentSet();
  if (s.games.nos === 0 && s.games.ellos === 0) return;

  match.sets.push(emptySet());
  match.currentSet = match.sets.length - 1;
  save();
  render();
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(30);
}

function matchHasData() {
  try {
    return match.sets.some(function(s) {
      return (s.drive.winners + s.drive.errors + s.drive.rally +
              s.reves.winners + s.reves.errors + s.reves.rally +
              s.games.nos + s.games.ellos) > 0;
    });
  } catch(e) {
    return false;
  }
}

function resetMatch() {
  if (!matchHasData()) {
    alert('No hay datos para guardar');
    return;
  }
  if (!confirm('¿Guardar partido actual y empezar uno nuevo?')) return;

  try {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({
      date: new Date().toISOString(),
      sets: JSON.parse(JSON.stringify(match.sets))
    });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) {
    alert('Error guardando historial: ' + e.message);
  }

  match = { currentSet: 0, sets: [emptySet()] };
  save();
  render();
}

function showHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    list.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Sin partidos guardados</p>';
  } else {
    list.innerHTML = history.map((h, i) => {
      const d = new Date(h.date);
      const dateStr = d.toLocaleDateString('es-AR', { weekday: 'short', day: '2-digit', month: '2-digit', year: '2-digit' });
      const scoreStr = h.sets.map(s => `${s.games.nos}-${s.games.ellos}`).join(' / ');

      const totals = h.sets.reduce((acc, s) => {
        ['drive', 'reves'].forEach(p => {
          ['winners', 'errors', 'rally'].forEach(k => { acc[p][k] += s[p][k]; });
        });
        return acc;
      }, { drive: { winners:0, errors:0, rally:0 }, reves: { winners:0, errors:0, rally:0 } });

      return `<div class="history-item">
        <div class="hi-header">
          <span class="hi-date">${dateStr}</span>
          <span class="hi-score">${scoreStr}</span>
          <button class="hi-delete" onclick="deleteHistory(${i})">🗑</button>
        </div>
        <div class="hi-details">
          <span class="hi-player" style="color:#6cf5a0">Drive:</span>
          <span class="hi-w">W:${totals.drive.winners}</span>
          <span class="hi-e">E:${totals.drive.errors}</span>
          <span class="hi-r">R:${totals.drive.rally}</span>
        </div>
        <div class="hi-details">
          <span class="hi-player" style="color:#ffb86c">Revés:</span>
          <span class="hi-w">W:${totals.reves.winners}</span>
          <span class="hi-e">E:${totals.reves.errors}</span>
          <span class="hi-r">R:${totals.reves.rally}</span>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('historyPanel').classList.add('active');
}

function hideHistory() {
  document.getElementById('historyPanel').classList.remove('active');
}

function deleteHistory(index) {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  history.splice(index, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  showHistory();
}

function exportData() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const data = { current: match, history };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `padel_stats_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-AR', {
  weekday: 'long', day: 'numeric', month: 'long'
});
load();
</script>
</body>
</html>
